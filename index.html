<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>OLZ Poker</title>

<style>
body {
  background: #0f0f1a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.box {
  background: #1c1c2e;
  width: 300px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 12px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #00ff99;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

#adminPanel {
  display: none;
}
</style>
</head>

<body>

<div class="box">
  <h2>OLZ POKER 🔥</h2>

  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
</div>

<div class="box" id="adminPanel">
  <h3>👑 ADMIN PANEL</h3>
  <ul id="list"></ul>
</div>

<script>
const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

function login() {
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if(u === "" || p === "") {
    alert("Бүгдийг бөглө");
    return;
  }

  // admin шалгах
  if(u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById("adminPanel").style.display = "block";
    showUsers();
    return;
  }

  // user хадгалах
  let users = JSON.parse(localStorage.getItem("users") || "[]");
  users.push({u, p});
  localStorage.setItem("users", JSON.stringify(users));

  alert("Амжилттай нэвтэрлээ");
}

// admin-д харагдах
function showUsers() {
  let users = JSON.parse(localStorage.getItem("users") || "[]");
  let list = document.getElementById("list");
  list.innerHTML = "";

  users.forEach(x => {
    let li = document.createElement("li");
    li.textContent = x.u + " / " + x.p;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
